# Crowdin configuration for OpenISMS
# Docs: https://developer.crowdin.com/configuration-file/
#
# Setup:
#   1. Create a project on https://crowdin.com
#   2. Set CROWDIN_PROJECT_ID and CROWDIN_PERSONAL_TOKEN as GitHub Secrets
#   3. The GitHub Action (.github/workflows/crowdin.yml) handles sync automatically

project_id_env: CROWDIN_PROJECT_ID
api_token_env: CROWDIN_PERSONAL_TOKEN
base_path: "."
base_url: "https://api.crowdin.com"
preserve_hierarchy: true

files:
  - source: /frontend/public/locales/en/*.json
    translation: /frontend/public/locales/%two_letters_code%/%original_file_name%
    # i18next_json handles {{variable}} interpolation and _one/_other plural keys
    type: i18next_json
    # Mark existing translations as needing review when source strings change
    update_option: update_as_unapproved
    # Do not export untranslated strings (keeps locale files clean)
    export_options:
      export_translated_only: true
