# SonarQube project configuration.
# The CI workflow (.github/workflows/security.yml) only adds the dynamic
# projectVersion and qualitygate.wait flag on top of these values.
sonar.projectKey=OpenISMS
sonar.projectName=OpenISMS

sonar.sources=backend/src,frontend/src
sonar.exclusions=**/node_modules/**,**/dist/**,**/openapi.json,**/*.test.*

sonar.javascript.file.suffixes=.js,.jsx
sonar.typescript.file.suffixes=.ts,.tsx
sonar.sourceEncoding=UTF-8
