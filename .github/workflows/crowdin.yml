name: Crowdin – Sync Translations

# Uploads English source strings to Crowdin whenever locale/en files change on
# main, and opens a PR with downloaded translations back into the repo.
# Can also be triggered manually for one-off syncs.

on:
  push:
    branches: [main]
    paths:
      - "frontend/public/locales/en/**"
  workflow_dispatch:
    inputs:
      upload_sources:
        description: "Upload English source strings to Crowdin"
        required: false
        default: "true"
        type: boolean
      download_translations:
        description: "Download approved translations from Crowdin"
        required: false
        default: "true"
        type: boolean

permissions:
  contents: write
  pull-requests: write

jobs:
  crowdin:
    name: Synchronize with Crowdin
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Crowdin Action
        uses: crowdin/github-action@v2
        with:
          # On push to main: upload sources only; translations are fetched via manual run or schedule
          upload_sources: ${{ github.event_name == 'push' || inputs.upload_sources == 'true' }}
          upload_translations: false

          # Download approved translations and open a PR so they can be reviewed
          download_translations: ${{ github.event_name == 'workflow_dispatch' && inputs.download_translations == 'true' }}

          # PR settings for downloaded translations
          create_pull_request: true
          pull_request_title: "🌍 New Crowdin translations"
          pull_request_body: |
            Automatically synced translations from [Crowdin](https://crowdin.com).

            Please review and merge to apply the latest approved translations.
          pull_request_base_branch_name: main
          localization_branch_name: crowdin-translations

          # Use the crowdin.yml at the repo root
          config: crowdin.yml

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CROWDIN_PROJECT_ID: ${{ secrets.CROWDIN_PROJECT_ID }}
          CROWDIN_PERSONAL_TOKEN: ${{ secrets.CROWDIN_PERSONAL_TOKEN }}
