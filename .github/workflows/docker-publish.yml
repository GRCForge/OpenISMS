name: Build & Publish Docker Image

# Publishes the single All-in-One application image (backend + frontend) to GHCR
# ONLY when a release happens, i.e. when the VERSION file changes on main (the
# same commit that release.yml turns into a GitHub Release + git tag). This
# avoids creating a new package version on every commit — each release yields
# exactly one updated `isms-app` image (vX.Y.Z + X.Y.Z + latest).
#
# Note: a tag/release created by release.yml uses GITHUB_TOKEN, and GitHub does
# not start new workflow runs from GITHUB_TOKEN-created tags. So we key off the
# VERSION change on the main push instead of a tag trigger. Use the manual
# "Run workflow" button to force a rebuild of the current VERSION.
#
# Trigger: path-filtered to VERSION only — does NOT run on normal code commits,
# keeping Actions minute usage minimal.

on:
  push:
    branches: [main]
    paths: ['VERSION']
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  # Package name must match the image name suffix in GHCR (without registry/owner)
  PACKAGE_NAME: openisms-app
  # Opt into Node.js 24 for JavaScript actions ahead of GitHub's forced switch
  # (2026-06-16). Silences the "Node.js 20 actions are deprecated" warning.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  # ── Gate: only publish on a release (VERSION bumped) or manual dispatch ─────
  gate:
    name: Decide whether to publish
    runs-on: self-hosted
    outputs:
      publish: ${{ steps.decide.outputs.publish }}
      version: ${{ steps.decide.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - id: decide
        run: |
          version=$(tr -d '[:space:]' < VERSION)
          echo "version=$version" >> "$GITHUB_OUTPUT"
          before="${{ github.event.before }}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            publish=true
          elif [ -z "$before" ] || [ "$before" = "0000000000000000000000000000000000000000" ]; then
            publish=true   # no diff base available — publish to be safe
          elif git diff --name-only "$before" "${{ github.sha }}" -- VERSION | grep -q .; then
            publish=true    # VERSION changed in this push => a release
          else
            publish=false
          fi
          echo "publish=$publish" >> "$GITHUB_OUTPUT"
          echo "Decision: publish=$publish (version=$version)"

  build:
    name: Build & Push
    needs: gate
    if: needs.gate.outputs.publish == 'true'
    runs-on: self-hosted
    permissions:
      contents: read
      packages: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image name (lowercase)
        id: info
        run: |
          echo "image=${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.PACKAGE_NAME }}" | tr '[:upper:]' '[:lower:]' >> "$GITHUB_OUTPUT"

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.info.outputs.image }}
          # One release => vX.Y.Z + X.Y.Z + latest, all on the All-in-One image.
          tags: |
            type=raw,value=v${{ needs.gate.outputs.version }}
            type=raw,value=${{ needs.gate.outputs.version }}
            type=raw,value=latest

      - name: Build and push
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Cleanup: remove untagged digests & keep last 10 tagged versions ────────
  # Implemented with `gh api` instead of actions/delete-package-versions (which
  # only ships a Node.js 20 runtime and triggers a deprecation warning). The
  # script is non-fatal: precise deletions only (untagged, and tagged versions
  # beyond the newest 10 — never `latest`), and every call tolerates errors so a
  # missing permission can never fail the build or delete the wrong image.
  cleanup:
    name: Cleanup old packages
    runs-on: self-hosted
    needs: build
    permissions:
      packages: write
    steps:
      - name: Prune untagged and stale package versions
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OWNER: ${{ github.repository_owner }}
          PACKAGE: ${{ env.PACKAGE_NAME }}
        run: |
          set -uo pipefail
          # User- and org-owned packages use different REST base paths.
          OWNER_TYPE=$(gh api "users/${OWNER}" --jq .type 2>/dev/null || echo User)
          if [ "$OWNER_TYPE" = "Organization" ]; then
            BASE="orgs/${OWNER}/packages/container/${PACKAGE}/versions"
          else
            BASE="users/${OWNER}/packages/container/${PACKAGE}/versions"
          fi

          versions=$(gh api --paginate "${BASE}?per_page=100" 2>/dev/null || echo '[]')
          count=$(echo "$versions" | jq 'length')
          echo "Found ${count} version(s) for ${PACKAGE} (${OWNER_TYPE})"

          # 1) Delete untagged versions
          echo "$versions" \
            | jq -r '.[] | select((.metadata.container.tags // []) | length == 0) | .id' \
            | while read -r id; do
                [ -n "$id" ] || continue
                if gh api -X DELETE "${BASE}/${id}" >/dev/null 2>&1; then
                  echo "  deleted untagged ${id}"
                else
                  echo "  skip untagged ${id} (no permission or already gone)"
                fi
              done

          # 2) Keep the newest 10 tagged versions; never touch one tagged 'latest'
          echo "$versions" \
            | jq -r '[.[]
                | select((.metadata.container.tags // []) | length > 0)
                | select((.metadata.container.tags // []) | index("latest") | not)]
                | sort_by(.created_at) | reverse | .[10:][] | .id' \
            | while read -r id; do
                [ -n "$id" ] || continue
                if gh api -X DELETE "${BASE}/${id}" >/dev/null 2>&1; then
                  echo "  deleted stale tagged ${id}"
                else
                  echo "  skip stale tagged ${id} (no permission or already gone)"
                fi
              done

          echo "Cleanup finished"
