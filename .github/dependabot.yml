version: 2
updates:
  # ── Backend (npm) ──────────────────────────────────────────────────────────
  - package-ecosystem: "npm"
    directory: "/backend"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "backend"
    # Bundle low-risk minor/patch bumps into a single PR to cut review noise.
    # Major bumps stay as individual PRs so the backend smoke-test job can vet
    # each breaking upgrade (e.g. @simplewebauthn/server, openid-client) on its
    # own before merge.
    groups:
      backend-minor-patch:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"

  # ── Frontend (npm) ─────────────────────────────────────────────────────────
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "frontend"
    groups:
      frontend-minor-patch:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"

  # ── GitHub Actions ─────────────────────────────────────────────────────────
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
    labels:
      - "dependencies"
      - "github-actions"
    groups:
      github-actions:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"
          - "major"
